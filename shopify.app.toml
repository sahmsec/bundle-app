# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "704154c8a1881ae3cc79c87023d502ac"
name = "Bundle Builder"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_orders"

[app_proxy]
url = "https://example.com/proxy"
subpath = "bundle-data"
prefix = "apps"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # --- TEMPORARILY DISABLED until Protected Customer Data access is enabled ---
  # These involve protected customer data. Re-enable after turning on access at:
  # Partner Dashboard → Bundle Builder → API access → Protected customer data access.
  # orders/create powers analytics; the three compliance topics are required for
  # App Store submission. Uncomment all four once access is granted.
  # [[webhooks.subscriptions]]
  # uri = "/webhooks/orders/create"
  # topics = [ "orders/create" ]

  # [[webhooks.subscriptions]]
  # uri = "/webhooks/customers/data_request"
  # compliance_topics = [ "customers/data_request" ]

  # [[webhooks.subscriptions]]
  # uri = "/webhooks/customers/redact"
  # compliance_topics = [ "customers/redact" ]

  # [[webhooks.subscriptions]]
  # uri = "/webhooks/shop/redact"
  # compliance_topics = [ "shop/redact" ]

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home/api/auth" ]

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
